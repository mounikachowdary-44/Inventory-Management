{% extends "base.html" %}
{% block title %}Add Product — Inventory Ledger{% endblock %}
{% block content %}

<div class="ledger-header">
  <div>
    <h1>Add Product</h1>
    <div class="subtitle">Enter a new item into the ledger.</div>
  </div>
</div>

<form class="card-form" method="POST">
  <div class="field">
    <label for="product_id">Product ID</label>
    <input type="text" id="product_id" name="product_id" required placeholder="P005">
  </div>
  <div class="field">
    <label for="name">Product Name</label>
    <input type="text" id="name" name="name" required placeholder="e.g. USB Cable">
  </div>
  <div class="field">
    <label for="category">Category</label>
    <input type="text" id="category" name="category" required placeholder="e.g. Electronics">
  </div>
  <div class="field">
    <label for="price">Price (₹)</label>
    <input type="number" id="price" name="price" step="0.01" min="0" required>
  </div>
  <div class="field">
    <label for="quantity">Quantity Available</label>
    <input type="number" id="quantity" name="quantity" min="0" required>
  </div>
  <div class="field">
    <label for="supplier">Supplier Name</label>
    <input type="text" id="supplier" name="supplier" required placeholder="e.g. TechSupply Co.">
  </div>
  <button class="btn" type="submit">Save Product</button>
  <a class="btn secondary" href="{{ url_for('dashboard') }}">Cancel</a>
</form>

{% endblock %}
