{% extends "base.html" %}
{% block title %}Add Stock — Inventory Ledger{% endblock %}
{% block content %}

<div class="ledger-header">
  <div>
    <h1>Add Stock</h1>
    <div class="subtitle">Increase the available quantity for an existing product.</div>
  </div>
</div>

<form class="card-form" method="POST">
  <div class="field">
    <label for="product_id">Product ID</label>
    <select id="product_id" name="product_id" required>
      <option value="" disabled selected>Select a product…</option>
      {% for p in products %}
      <option value="{{ p.product_id }}">{{ p.product_id }} — {{ p.name }} (current: {{ p.quantity }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="quantity">Quantity to Add</label>
    <input type="number" id="quantity" name="quantity" min="1" required>
  </div>
  <button class="btn" type="submit">Add Stock</button>
  <a class="btn secondary" href="{{ url_for('dashboard') }}">Cancel</a>
</form>

{% endblock %}
